{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "db-migration.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "db-migration.labels" . | nindent 4 }}
  annotations:
    # Lower wave ensures the ServiceAccount exists before the Job hook runs.
    argocd.argoproj.io/sync-wave: {{ sub (.Values.job.syncWave | int) 1 | quote }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
