apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "db-migration.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "db-migration.labels" . | nindent 4 }}
  {{- if .Values.job.hookPhase }}
  annotations:
    helm.sh/hook: {{ .Values.job.hookPhase }}
    helm.sh/hook-weight: {{ sub (.Values.job.hookWeight | int) 1 | quote }}
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
data:
  # flyway.conf is mounted into the container and auto-detected by Flyway.
  # Connection URL and credentials are injected via environment variables
  # so they are never stored in plain text here.
  flyway.conf: |
    flyway.url={{ include "db-migration.jdbcUrl" . }}
    flyway.table={{ .Values.flyway.table }}
    flyway.validateOnMigrate={{ .Values.flyway.validateOnMigrate }}
    flyway.outOfOrder={{ .Values.flyway.outOfOrder }}
    # Explicit location; Flyway 10 deprecates the default "sql" folder.
    flyway.locations=filesystem:/flyway/migrations
    {{- if .Values.flyway.schemas }}
    flyway.schemas={{ .Values.flyway.schemas }}
    {{- end }}
