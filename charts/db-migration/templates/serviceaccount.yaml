{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "db-migration.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "db-migration.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.job.hookPhase }}
    # The ServiceAccount must exist before the hook Job runs, so give it
    # a weight one step earlier than the Job's hook weight.
    helm.sh/hook: {{ .Values.job.hookPhase }}
    helm.sh/hook-weight: {{ sub (.Values.job.hookWeight | int) 1 | quote }}
    helm.sh/hook-delete-policy: before-hook-creation
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
